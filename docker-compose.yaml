version: "3.8"

services:
  vaultwarden:
    image: vaultwarden/server:1.30.5
    container_name: vaultwarden
    restart: always

    volumes:
      - /vw-data:/data

    environment:
      ROCKET_PROFILE: "release"
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_PORT: "80"
      ADMIN_TOKEN: ${ADMIN_TOKEN}

    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3

    networks:
      - internal

  nginx:
    image: nginx:stable
    container_name: vaultwarden-nginx
    restart: always

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro

    depends_on:
      - vaultwarden

    networks:
      - internal

networks:
  internal:
    driver: bridge
